- name: divertor
  description: Divertor plasma-facing component.
  documentation: 'The divertor is a specialized plasma-facing component designed to exhaust heat and particles
    from the plasma by directing open field lines from the [scrape_off_layer](#scrape_off_layer) to remote
    target plates. Divertor configuration is the standard approach for power handling in modern tokamaks.


    Physical principle:


    The divertor uses a null point ([magnetic_separatrix](#magnetic_separatrix)) in the poloidal field
    to separate the confined plasma from a divertor chamber. Open field lines in the SOL intersect target
    plates in the divertor, where plasma recombines and neutrals are pumped. The divertor geometry controls
    particle and energy exhaust through magnetic field line topology.


    Power handling:


    The divertor must handle significant heat flux (5-20 MW/m$^2$ steady-state, higher during transients)
    while maintaining acceptable target temperature and limiting erosion. Detachment (reducing target
    temperature via radiation and volumetric recombination) is used for power dissipation. Heat flux distribution
    determines [heat_flux_to_divertor](#heat_flux_to_divertor) patterns and target loading.


    Fueling and exhaust:


    The divertor region provides fueling through gas injection and removes helium ash and impurities via
    differential pumping. Closed divertor geometries improve neutral compression for effective pumping.
    The divertor controls particle balance and impurity contamination of the core plasma.


    Related quantities:


    The divertor relates to [plasma_boundary](#plasma_boundary) through the magnetic separatrix, [scrape_off_layer](#scrape_off_layer)
    through open field lines, and [heat_flux_to_divertor](#heat_flux_to_divertor) through power deposition
    patterns. Divertor configuration affects [first_wall](#first_wall) loading and plasma performance.'
  status: draft
  tags:
  - divertor-configuration
  kind: metadata
- name: heat_flux_to_divertor
  description: Heat flux to divertor target.
  documentation: 'Heat flux to divertor target surfaces, representing the thermal power per unit area
    deposited where scrape-off layer field lines intersect divertor plates. This quantity includes contributions
    from parallel electron and ion heat conduction, convection, and radiation, determining divertor power
    handling capabilities.


    Power balance:


    The total power to the [divertor](#divertor) $P_{\text{div}}$ equals heating power minus radiated
    and convected losses:


    $$P_{\text{div}} = P_{\text{heat}} - P_{\text{rad}} - P_{\text{loss}}$$


    This power distributes between inner and outer divertor targets, with peak heat flux at strike points
    where separatrix field lines intersect targets.


    Physical significance:


    Heat flux to divertor targets determines power handling requirements and affects divertor performance.
    Steady-state heat flux limits are typically 5-20 MW/m$^2$ for actively cooled targets. Higher fluxes
    lead to excessive erosion and melting. Transient events (ELMs, disruptions) can briefly deliver much
    higher fluxes. See [divertor](#divertor) for power handling context and [scrape_off_layer](#scrape_off_layer)
    for field line relationships.


    Physical constraints:


    Steady-state heat flux limits are typically 5-20 MW/m$^2$ for actively cooled targets. Higher fluxes
    lead to excessive erosion and melting. Transient events (ELMs, disruptions) can briefly deliver much
    higher fluxes. Heat flux distribution affects divertor material loading and determines cooling requirements.


    Mitigation strategies:


    Divertor detachment, strike point sweeping, impurity seeding for radiation, and advanced magnetic
    geometries reduce peak heat flux. Power distribution optimization and real-time control manage heat
    flux within material limits.


    Measurement methods:


    Heat flux to divertor is measured using thermocouples, infrared cameras, and Langmuir probes. Divertor
    diagnostics measure surface temperature and power deposition. Heat flux analysis requires power balance
    calculations and field line mapping. Multiple measurement techniques provide validation and spatial
    resolution.


    Typical values:


    Attached divertor: 5-20 MW/m$^2$ at outer strike point, partially detached: 1-5 MW/m$^2$, fully detached:
    < 1 MW/m$^2$. Heat flux varies with plasma conditions and divertor configuration.


    Sign convention: Positive heat flux indicates power flow toward divertor surface, following standard
    heat transfer conventions with power density measured in W/m$^2$.'
  status: draft
  tags:
  - measured
  kind: scalar
  unit: W.m^-2
- name: scrape_off_layer
  description: Region outside last closed flux surface.
  documentation: 'The scrape-off layer (SOL) is the region between the [last_closed_flux_surface](#last_closed_flux_surface)
    and the [first_wall](#first_wall) where magnetic field lines intersect material surfaces. In diverted
    configurations, the SOL includes the field lines that connect to the [divertor](#divertor) targets.
    The SOL is critical for plasma-wall interactions and power handling in tokamak operation.


    Physics context:


    The SOL is characterized by open field lines, steep gradients in plasma parameters, and direct plasma-wall
    interactions. Heat and particles flow along field lines to material surfaces, making the SOL critical
    for power handling and impurity control. The SOL width determines heat flux spreading and affects
    [heat_flux_to_divertor](#heat_flux_to_divertor) distribution. See [plasma_boundary](#plasma_boundary)
    for confined plasma boundary and [magnetic_separatrix](#magnetic_separatrix) for diverted topology.


    Physical significance:


    The SOL controls plasma-wall interactions and determines impurity generation and fuel recycling. Heat
    and particles flowing along field lines deposit on material surfaces, affecting [first_wall](#first_wall)
    loading and [divertor](#divertor) performance. SOL parameters affect [plasma_boundary](#plasma_boundary)
    stability and MHD mode structure. SOL width determines power handling capabilities and affects [plasma_current](#plasma_current)
    requirements.


    Key processes:


    Parallel transport along field lines dominates energy and particle loss. Cross-field transport through
    turbulence and drifts determines SOL width. Plasma-neutral interactions include recycling, sputtering,
    and radiation. Impurity generation and transport affect core contamination. Power balance includes
    conducted and radiated power to material surfaces.


    Related quantities:


    The SOL relates to [plasma_boundary](#plasma_boundary) through the last closed flux surface, [magnetic_separatrix](#magnetic_separatrix)
    in diverted operation, and [heat_flux_to_divertor](#heat_flux_to_divertor) through power deposition
    patterns. SOL width affects [divertor](#divertor) loading and plasma performance. SOL parameters influence
    [energy_confinement_time](#energy_confinement_time).


    Measurement methods:


    SOL parameters are measured using edge diagnostics including Thomson scattering for temperature and
    density, Langmuir probes for plasma parameters, and heat flux monitors for power deposition. [Flux_loop_voltage](#flux_loop_voltage)
    integration provides boundary information. SOL analysis requires multiple diagnostic measurements
    across the edge region.'
  status: active
  tags:
  - flux-coordinates
  kind: metadata
