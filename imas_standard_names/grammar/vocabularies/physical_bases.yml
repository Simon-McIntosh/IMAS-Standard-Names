  # === breadth-rotation gap closure (codex VocabGap analysis) ===
  # Genuine atomic dimensional/dimensionless bases surfaced by parser-
  # rejected tokens that blocked name composition. Verified against the
  # IMAS DD (equilibrium, FOCS, polarimeter, blanket, SOL domains).

  thickness:
    # layer/wall/blanket material thickness (length normal to a surface);
    # distinct from width (in-plane span) and length (path extent)
    aliases: []
    kind: scalar
    inherently_dimensional: true
  diameter:
    # full transverse extent of a circular feature (= 2*radius); atomic
    # because DD stores diameters directly (apertures, beams, pipes)
    aliases: []
    kind: scalar
    inherently_dimensional: true
  connection_length:
    # scrape-off-layer parallel field-line connection length (target-to-
    # target along B); a defining SOL transport scale
    aliases: []
    kind: scalar
    inherently_dimensional: true
  loop_voltage:
    # toroidal one-turn loop voltage V_loop = dPsi/dt driving the plasma
    # current; a lexicalised plasma quantity distinct from voltage_of_flux_loop
    aliases: []
    kind: scalar
    inherently_dimensional: true
  permeability:
    # magnetic permeability mu relating B and H in a material/medium
    aliases: []
    kind: scalar
    inherently_dimensional: true
  poloidal_current_function:
    # equilibrium F = R*B_phi (the "f" / poloidal-current flux function);
    # its flux derivative gives the FF' source term in Grad-Shafranov
    aliases: [diamagnetic_function]
    kind: scalar
    inherently_dimensional: true
  flux_surface_averaged_metric:
    # flux-surface-averaged geometric metric coefficient (the equilibrium
    # gm1..gm9 family: <1/R^2>, <|grad rho|^2>, ...); the specific moment is
    # named via qualifiers/object, not separate ordinal bases
    aliases: [flux_surface_metric_coefficient]
    kind: scalar
  stokes_parameter:
    # polarimetry Stokes parameter (I/Q/U/V intensity components of the
    # polarization state); FOCS/polarimeter S0..S3. The specific component is
    # named via qualifiers, not separate compound bases
    aliases: []
    kind: scalar
  turn_count:
    # number of conductor turns of a coil/loop (engineering construction
    # parameter); dimensionless integer count
    aliases: [number_of_turns]
    kind: scalar
  turns_per_metre:
    # linear turn density of a solenoid/coil winding (turns per unit length)
    aliases: []
    kind: scalar
    inherently_dimensional: true

  # === radiometric, atomic, MHD, and diagnostic base additions ===
  # Genuine irreducible bases from codex VocabGap analysis. DD-confirmed
  # (spectrometers, SXR/HXR cameras, sawteeth, atomic state, equilibrium).
  # Each is irreducible: no qualifier+base decomposition yields it.

  ionisation_potential:
    # cumulative/average atomic ionisation potential of an ion charge state
    # (energy to strip electrons); British spelling matches the DD path name
    # (core_profiles/.../ion/state/ionisation_potential). eV.
    aliases: [ionization_potential]
    kind: scalar
    inherently_dimensional: true
  radiance:
    # radiometric radiance: power per unit area per unit solid angle
    # (W.m^-2.sr^-1); the broadband counterpart to spectral_radiance.
    # DD: spectrometer_*/processed_line/radiance, soft_x_rays/channel/intensity
    aliases: []
    kind: scalar
    inherently_dimensional: true
  brightness:
    # radiometric brightness: power flux per unit solid angle per unit area
    # (= power / etendue). DD names this distinctly from radiance
    # (hard_x_rays/channel/brightness), so it is its own base.
    aliases: []
    kind: scalar
    inherently_dimensional: true
  instrument_function:
    # spectrometer / diagnostic instrument response function (PSF); the
    # detector line-shape that convolves the true spectrum. DD:
    # spectrometer_*/channel/instrument_function. Units vary (may be
    # normalized), so not inherently_dimensional.
    aliases: []
    kind: scalar
  rotational_transform:
    # rotational transform iota = 1/q (field-line winding per toroidal
    # transit); dimensionless. Distinct from safety_factor. DD: summary
    # iota, distributions SFL grids.
    aliases: [iota]
    kind: scalar
  psi_star:
    # perturbed poloidal flux Psi* = psi - phi (MHD sawtooth analysis);
    # poloidal magnetic flux (Wb). DD: sawteeth/profiles_1d/psi_star_*.
    aliases: []
    kind: scalar
    inherently_dimensional: true

  # === grammar-stabilisation vocabulary additions (codex full-DD compose
  # gap analysis) === Genuine irreducible bases surfaced by parser-rejected
  # tokens that blocked name composition across the full DD. DD-confirmed.

  magnetic_vector_potential:
    # magnetic vector potential A (B = curl A); SI unit m.T (= V.s.m^-1 = Wb.m^-1).
    # DD: a_field (n=34). Vector base distinct from scalar magnetic_flux. The
    # shorter lexical surface form `vector_potential` is its own base entry
    # (used by the MHD perturbed_parallel_vector_potential names).
    aliases: []
    kind: vector
    inherently_dimensional: true
  larmor_radius:
    # gyroradius of a charged particle in a magnetic field (m); enables the
    # dimensionless normalized_larmor_radius (rho*) via the normalized operator.
    aliases: [gyroradius]
    kind: scalar
    inherently_dimensional: true
  vibrational_level:
    # molecular vibrational quantum level (dimensionless quantum number);
    # atomic/molecular state index, not a physical length.
    aliases: []
    kind: scalar
  probability:
    # dimensionless probability (0..1) of an event/state.
    aliases: []
    kind: scalar
  parity:
    # gyrokinetic eigenmode parity (dimensionless: even/odd symmetry indicator).
    aliases: []
    kind: scalar
  efficiency:
    # dimensionless efficiency / yield ratio (0..1); dedups detection_efficiency,
    # light_collection_efficiency, balance-of-plant efficiencies into one base.
    aliases: []
    kind: scalar
  peaking_factor:
    # dimensionless profile peaking factor (e.g. central/volume-averaged ratio,
    # t_e_peaking); a shape descriptor of a 1D profile.
    aliases: []
    kind: scalar
  field_current_coupling_coefficient:
    # electromagnetic coupling (Green's-function) response of a magnetic field
    # to a coil current: B per unit I (SI unit A^-1.T). DD: em_coupling.
    aliases: [field_per_current_coupling, magnetic_field_response]
    kind: scalar
    inherently_dimensional: true
  roughness:
    # optical-element surface roughness (RMS height); units vary (length or
    # normalized), so not inherently_dimensional.
    aliases: []
    kind: scalar
  fluence:
    # time-integrated surface particle/photon flux (m^-2); cumulative areal dose.
    aliases: []
    kind: scalar
    inherently_dimensional: true
  tritium_breeding_ratio:
    # dimensionless tritium breeding ratio (TBR) of a blanket.
    aliases: []
    kind: scalar
  fusion_gain:
    # dimensionless fusion energy gain Q (fusion power / input heating power).
    aliases: []
    kind: scalar
  charge_number:
    # signed integer charge number Z of an ion charge state (dimensionless);
    # distinct from `charge` (the dimensional electric charge in C). Enables
    # square_of_ion_charge_number (z_ion_square).
    aliases: []
    kind: scalar

  # === base-bound lexical compounds promoted to atomic bases ===
  # These tokens form a single lexicalised quantity in which the leading word
  # is NOT a free prefix qualifier: it binds to exactly one base and never
  # qualifies any other. Per the corpus analysis they are atomic bases, not
  # qualifier+base compositions. The former prefix qualifiers (convection,
  # heating, vector, center_of_mass, angular, internal) are removed from
  # qualifiers.yml because they are fully subsumed by these bases. The parser
  # matches the longest base first, so the standalone compound resolves
  # atomically; longer compounds (e.g. ion_kinetic_energy_density) still strip
  # their genuine prefix qualifiers leftward.

  convection_velocity:
    # convective transport velocity (the drift velocity of a convected flux);
    # convection binds to velocity and never qualifies any other base.
    aliases: []
    kind: vector
    inherently_dimensional: true
  heating_power:
    # auxiliary/nuclear heating power delivered to a system; heating binds to
    # power as a single lexical quantity (total_external_heating_power,
    # nuclear_heating_power_of_breeder_blanket_module).
    aliases: []
    kind: scalar
    inherently_dimensional: true
  vector_potential:
    # magnetic vector potential A (B = curl A); SI unit m.T (= Wb.m^-1). The
    # lexical surface form used in MHD perturbation names
    # (perturbed_parallel_vector_potential). Vector base, like
    # magnetic_vector_potential.
    aliases: []
    kind: vector
    inherently_dimensional: true
  center_of_mass_velocity:
    # bulk velocity of the centre-of-mass frame; center_of_mass binds to
    # velocity as a single lexical quantity.
    aliases: []
    kind: vector
    inherently_dimensional: true
  angular_momentum:
    # angular momentum L (kg.m^2.s^-1); angular binds to momentum.
    aliases: []
    kind: scalar
    inherently_dimensional: true
  angular_width:
    # angular width / extent (rad); angular binds to width. Lexicalised
    # alongside angular_momentum/frequency/velocity (the 'angular' qualifier
    # retired in the base-bound promotion).
    aliases: []
    kind: scalar
    inherently_dimensional: true
  angular_frequency:
    # angular frequency omega = 2*pi*f (rad.s^-1); angular binds to frequency.
    aliases: []
    kind: scalar
    inherently_dimensional: true
  angular_velocity:
    # angular (rotational) velocity Omega (rad.s^-1); angular binds to velocity.
    aliases: []
    kind: vector
    inherently_dimensional: true
  internal_inductance:
    # plasma internal inductance L_i (H); internal binds to inductance. The
    # normalized form li is its own base.
    aliases: []
    kind: scalar
    inherently_dimensional: true
  internal_energy:
    # thermodynamic internal energy U (J); internal binds to energy.
    aliases: []
    kind: scalar
    inherently_dimensional: true
  kinetic_energy:
    # kinetic energy (J); kinetic binds to energy as a single lexical quantity
    # for the standalone X_kinetic_energy forms. The `kinetic` qualifier is
    # KEPT for kinetic_energy_density / kinetic_energy_flux, where it qualifies
    # density/flux (longest-base-match: ion_kinetic_energy -> base=kinetic_energy,
    # ion_kinetic_energy_density -> base=density + qualifier kinetic).
    aliases: []
    kind: scalar
    inherently_dimensional: true
  surface_area:
    # area of a (2D) bounding surface (m^2); surface binds to area. The
    # `surface` qualifier is KEPT for surface_temperature / surface_roughness /
    # surface_emissivity, where it qualifies other bases.
    aliases: []
    kind: scalar
    inherently_dimensional: true
