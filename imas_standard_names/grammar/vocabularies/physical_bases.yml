# Physical bases vocabulary (plan 38 §A6, reduced plan 41 §A2)
#
# Closed vocabulary of irreducible dimensional base quantities.
# Compound tokens (qualifier + base) have been factored out —
# qualifiers live in qualifiers.yml.
#
# Reduction criteria (plan 41):
#   KEEP if the token represents a fundamental dimensional quantity
#   that cannot be further decomposed into qualifier + base.
#   KEEP dimensionless atomic quantities (beta, elongation, …).
#   REMOVE if prefix tokens are valid qualifiers/subjects and
#   the remainder is itself a valid base.
#
# Structure per entry:
#   aliases                - list of alternate tokens (empty default)
#   kind                   - scalar | vector | tensor | complex
#   inherently_dimensional - true if this base always carries SI units;
#                            unit='1' on these is flagged by the validator
#                            unless an operator (normalized, perturbed, …)
#                            explicitly produces dimensionless output.

