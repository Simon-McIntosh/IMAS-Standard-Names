# Physical bases vocabulary (plan 38 §A6)
#
# Closed vocabulary of physical quantity nouns used as the base of a
# standard name.  Replaces the current open-fallback behaviour in the
# parser: any residue not found here (or in geometry_carriers.yml) will
# be REJECTED with an actionable diagnostic.
#
# Token rule: a physical_base is a noun phrase describing a physical
# quantity (temperature, pressure, density, magnetic_field, …) but is
# NEVER a generic one — see generic_physical_bases.yml for those that
# require a qualifier (current, power, voltage, …).
#
# Structure per entry:
#   aliases  - list of alternate tokens (empty default)
#   kind     - scalar | vector | tensor | complex
#
# Populated by W2a from the rc20 corpus mining (plan 38 §A9, 479 names).
# Maximal closure: every physical_base residue from rc20 parsing that is
# plausibly a quantity noun after operator/subject/locus decomposition.

