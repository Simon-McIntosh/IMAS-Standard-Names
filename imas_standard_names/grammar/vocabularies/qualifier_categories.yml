# Qualifier categories — presentation grouping for the Grammar composer.
#
# Maps each qualifier token in qualifiers.yml to exactly one normalized
# category, collapsing the ~39 historical comment-families into 12 buckets.
# Authoritative source for token->category. The grammar parser populates
# IR Qualifier.category from this file; the catalog dataset emits it in
# GRAMMAR_VOCAB so the SPA's qualifier picker can sub-group cleanly.
#
# Invariant (enforced by tests): every qualifiers.yml token appears in
# EXACTLY ONE category here, and no extra tokens. Add a token here in the
# same change that adds it to qualifiers.yml.

qualifier_categories:
  # Transport channel, regime, and flow type
  transport:
    - classical
    - fast_wave
    - linear
    - mhd
    - reynolds
    - slow_wave
    - sonic
    - wave

  # Source / drive mechanism and material
  source:
    - alpha
    - beam
    - bremsstrahlung
    - ferritic
    - gas
    - inductive
    - mutual
    - nbi
    - nuclear
    - radiative
    - rf
    - waste

  # Geometric, directional, and tensor qualifiers
  geometry:
    - contravariant
    - covariant
    - cross_field
    # NOTE: 'diamagnetic' moved to channel_qualifiers.yml (binds to the
    # transport channel: diamagnetic_momentum_diffusivity).
    - direction
    - e_cross_b
    - field_aligned
    - field_line
    - major
    - minor
    - non_axisymmetric
    - surface
    - volumetric

  # State, condition, mode, and named-physics qualifiers
  state:
    - alfven
    - atomic
    - average
    - breakdown
    - critical
    - decay
    - effective
    - enhancement
    - equilibrium
    - external
    - fluctuating
    - ideal
    - lower_bound
    - mean
    - mode
    - peak
    - quench
    - saturated
    - sawtooth
    - steady_state
    - stray
    - townsend
    - transient
    - upper_bound
    - vacuum

  # Energy type and power/flux direction
  energy:
    - absorbed
    - conducted
    - convected
    - current_weighted
    - deposited
    - forward
    - incident
    # NOTE: 'kinetic' moved to channel_qualifiers.yml (binds to the transport
    # channel: kinetic_energy_flux). It is no longer a base-binding qualifier.
    - launched
    - lost
    - radiated
    - stored

  # Measurement, diagnostic method, and signal qualifiers
  diagnostic:
    - beat
    - bragg
    - calibration
    - doppler
    - extraordinary_mode
    - faraday
    - fitted
    - floating
    - measured
    - motional_stark
    - ordinary_mode
    - polarization
    - pulse
    - reconstructed
    - reference
    - reflected
    - simulated
    - soft_xray
    - spectral
    - spun
    - straight_field_line
    - target
    - trigger
    - twist
    - viewing

  # Wave polarization and sign/polarity
  polarization:
    - left_hand_circularly_polarized
    - negative
    - positive
    - right_hand_circularly_polarized

  # Temporal qualifiers
  temporal:
    - final
    - initial
    - instantaneous
    # NOTE: 'time_averaged' removed — it is the participle form of the
    # time_average -> time_averaged reduction operator (operators.yml), not a
    # base-binding qualifier.

  # Dimensionless / normalized forms
  normalized:
    - bohm
    - ejima
    - greenwald
    - gyro_bohm

  # Species-related (non-subject) qualifiers
  species:
    # NOTE: 'plasma' moved to channel_qualifiers.yml (binds to the transport
    # channel: plasma_momentum_flux). It is no longer a base-binding qualifier.
    - slow

  # Engineering subsystem and numerical-split qualifiers
  engineering:
    - coolant
    - explicit
    - implicit
    - prefill
    - requested
