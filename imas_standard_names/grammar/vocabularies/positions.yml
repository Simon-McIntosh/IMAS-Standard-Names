# Positions vocabulary: points, lines, and surfaces
#
# Can be used with BOTH "of_" and "at_" depending on semantic context:
#   - "of_<token>" = intrinsic geometric property (major_radius_of_plasma_boundary)
#   - "at_<token>" = field quantity evaluated there (electron_temperature_at_plasma_boundary)
#
# Examples:
#   - major_radius_of_plasma_boundary (geometric property)
#   - electron_temperature_at_magnetic_axis (field at location)
#   - poloidal_flux_at_plasma_boundary (flux evaluated at boundary)
#
# Note: multi-dimensional zones (halo_region, core_region, divertor_region,
# edge_region, halo_boundary, scrape_off_layer) live in regions.yml and
# compose with the `over_` template. See plan 29 / ADR-4 F4.

- active_limiter_point
- closest_wall_point
- current_center
- divertor_target
- first_point_of_interferometer_beam
- first_wall
- flux_surface
- inner_divertor_target
- inner_midplane
- last_closed_flux_surface
- limiter
- magnetic_axis
- midplane
- minimum_safety_factor
- outboard_midplane
- outboard_midplane_height
- outer_divertor_target
- outer_midplane
- plasma_boundary
- primary_strike_point
- primary_x_point
- reference_major_radius
- reference_position
- secondary_separatrix
- second_point_of_interferometer_beam
- spectral_line
- third_point_of_interferometer_beam

# === D.3 review §5 position additions ===
- sawtooth_inversion_radius              # radial location of sawtooth temperature inversion
- neoclassical_tearing_mode_center       # rational surface center of NTM island
- inside_flux_surface                    # interior of a magnetic flux surface
- halo_boundary                          # boundary of the halo current region
- strike_point                           # generic divertor strike point location
- secondary_separatrix_strike_point      # strike point on secondary separatrix

# === D.3 review §5 geometry additions ===
# (geometry segment shares this vocabulary via `of_<token>` template)
- beam_tracing_point                     # point along a ray/beam-tracing trajectory
- beamlet_group                          # sub-bundle grouping of neutral beam beamlets
- delta_position                         # incremental displacement from reference position
- end_point                              # terminal point of a geometric path or segment
- start_point                            # initial point of a geometric path or segment
- halo_current_area_end_point            # end point of halo current cross-section area
- halo_current_area_start_point          # start point of halo current cross-section area
- plasma_boundary_gap_reference_point    # reference point for plasma-wall gap measurement
- x_point                               # magnetic null point (X-point) in poloidal plane
- outline_point                          # point on the boundary outline contour

# === D.5 review §5 additions ===
- tearing_mode_center                    # center of a tearing mode island (generic, any mode)
- normalized_poloidal_flux               # normalized poloidal flux coordinate surface

# === rc13 codex-rotation additions ===
# From magnetic_field_systems, particle_measurement_diagnostics,
# electromagnetic_wave_diagnostics, plasma_control rotation (gap export 2026-04-19).
- ferritic_insert_centroid               # centroid of a ferritic insert (passive magnetic structure)
- constraint_position                    # position of an equilibrium reconstruction constraint
- along_beam                             # location along a neutral / diagnostic beam trajectory
- ion_state                              # ionisation-state index (atomic state of an ion species)

# === rc14 vocabulary extensions (codex plan 31) ===
- ferritic_element_centroid              # synonym for ferritic_insert_centroid; DD ferritic/element/*
- neutron_detector                       # position mirror (was Objects-only)
- measurement_position                   # for distance_between_measurement_position_and_separatrix_*

