# Processes vocabulary: physical mechanisms and processes
#
# Usage: <base>_due_to_<process>
# Examples:
#   - heat_flux_due_to_conduction
#   - particle_flux_due_to_diffusion
#   - current_due_to_bootstrap
#
# Canonical-token policy (one token per mechanism): a mechanism has exactly
# ONE process token. Reworded synonyms of an existing mechanism are NOT added
# — the retired synonym -> canonical map is enforced by the curation gate in
# tests/test_process_synonym_gate.py so a rotation harvest cannot reintroduce
# a merged synonym. Physically DISTINCT mechanisms keep distinct tokens
# (e.g. line_radiation, synchrotron_radiation, impurity_radiation and
# surface_emission are separate radiation/emission mechanisms, not synonyms).

# === Transport mechanisms ===
# Transport-regime mechanisms are named as the full mechanism (`<regime>_transport`),
# not the bare adjective — the due_to_ slot names a PROCESS, so the additive
# decomposition reads e.g. particle_flux_due_to_anomalous_transport. General across
# any transported quantity (flux, diffusivity, current density, …).
- conduction
- convection
- diffusion
- anomalous_transport
- neoclassical_transport
- classical_transport
- turbulent_transport
- collisional_transport
- resistive_diffusion         # finite-resistivity flux/field diffusion (eta/mu0 grad^2 psi)
- ion_inertia                 # inertial / polarization current (J_pol ~ (n m_i/B^2) dE/dt)

# === Heating and current drive ===
# Current-drive mechanisms name the DRIVE (`<x>_current_drive`), not the resulting
# current quantity — e.g. current_density_due_to_bootstrap_current_drive. Ohmic has
# both a heating (dissipation) and a current-drive sense; both are provided.
- ohmic_heating
- ohmic_current_drive
- electron_cyclotron_heating
- ion_cyclotron_heating
- ion_cyclotron_current_drive
- lower_hybrid_current_drive
- neutral_beam_injection
- electron_cyclotron_current_drive

# === Atomic processes ===
- radiation
- impurity_radiation
- recombination
- ionization
- charge_exchange
- recycling          # plasma-wall recycling (divertor/wall neutral re-emission): particle_flux_due_to_recycling

# === Current drive mechanisms ===
- induction
- bootstrap_current_drive
- non_inductive_current_drive
- wave_driven_current_drive

# === Fueling ===
- gas_injection
- pellet_injection

# === Fusion reactions ===
- fusion_reactions            # generic fusion-reaction source (alpha/neutron/power)
- beam_beam_fusion
- beam_thermal_fusion

# === Electromagnetic and structural mechanisms ===
- magnetohydrodynamic
- external_coil
- eddy_current
- passive_structure
- disruption

# === Dissipation, viscous stress, and body forces ===
- neoclassical_tearing_mode   # neoclassical tearing mode (NTM) instability
- ohmic_dissipation            # ohmic (resistive Joule) dissipation
- resistive_flux_consumption   # resistive consumption of magnetic flux
- parallel_viscosity           # parallel viscous stress or dissipation
- perpendicular_viscosity      # perpendicular viscous stress or dissipation
- heat_viscosity               # gyroviscous (heat) stress
- j_cross_b_force              # J×B electromagnetic body force
- poloidal_current             # poloidal current generation
- viscous_heat_flux            # viscous contribution to heat flux

# === Collisions, drifts, and fast-particle mechanisms ===
- collisions                   # Coulomb / particle collisions process
- thermalization               # slowing-down of fast particles to thermal energy
- fast_ion                     # fast-ion drive / source process (e.g. NBI fast-ion current)
- e_cross_b_drift              # E×B drift mechanism (plasma_control, edge)
- thermal_fusion               # pure-thermal fusion (alongside beam_beam_, beam_thermal_)
- halo_current                 # halo current path (current through open field lines)

# Diamagnetic drift is a first-class transport mechanism: fluxes "due to
# diamagnetic drift" arise from the ∇p × B / (nqB²) drift in the
# fluid momentum equation. Distinct from the diamagnetic component of a
# vector (which is handled by `diamagnetic_*` physical_bases per
# components.yml guidance). DD sources: edge_profiles/*, transport/*.
- diamagnetic_drift

# === Runaway-electron generation and dissipation ===
- resistive_dissipation        # resistive (Joule) dissipation process
- dreicer                      # Dreicer mechanism for runaway electron generation
- neutral_beam_shinethrough    # neutral beam shine-through (uncaptured beam fraction)
- surface_emission             # surface (wall/divertor) particle or photon emission

# === Charge-state-resolved Coulomb collisions ===
# coulomb_collisions_with_electrons/ion/ion_state are species-resolved
# collision channels — distinct mechanisms, NOT synonyms of the generic
# `collisions` token above.
- coulomb_collisions_with_electrons  # Coulomb collisions specifically with electrons
- coulomb_collisions_with_ion        # Coulomb collisions specifically with bulk ions
- coulomb_collisions_with_ion_state  # Coulomb collisions with a specific ion charge state

# === Wave–particle, loss, and distribution-source mechanisms ===
- wave_particle_interaction           # resonant wave–particle interaction process
- conductive_losses                   # conductive heat / particle losses (first_wall, blanket)
- fast_particle_source                # distribution-source term from fast particles
- distribution_function_driven        # driven by an explicit distribution-function source (a specific source term, not the bare `driven`)
- fusion_born_alpha                   # alpha particles born from fusion reactions

# === Generic reaction / heating / injection / erosion mechanisms ===
- fusion                       # fusion reaction process
- heating                      # generic heating mechanism
- injection                    # generic injection process
- sputtering                   # sputtering erosion process
- viscosity                    # viscous transport process
- ohmic_induction
- ion_neutral_friction               # ion–neutral friction process (momentum exchange between ions and neutrals)

# === Runaway generation and scattering interactions ===
- hot_tail                     # hot-tail runaway generation mechanism
- compton_scattering           # Compton scattering interaction
- perturbed_parallel_magnetic_field     # perturbed parallel magnetic field process
- perturbed_parallel_vector_potential   # perturbed parallel vector potential process
- avalanche                    # runaway-electron avalanche generation (secondary RE multiplication; distinct from dreicer/hot_tail)
- first_orbit_loss             # prompt fast-ion first-orbit loss (unconfined fast ions lost on their first orbit)
- line_radiation               # bound-bound atomic line radiation (distinct from impurity_radiation / radiation)
- synchrotron_radiation        # synchrotron / electron-cyclotron radiation losses
