# Processes vocabulary: physical mechanisms and processes
#
# Usage: <base>_due_to_<process>
# Examples:
#   - heat_flux_due_to_conduction
#   - particle_flux_due_to_diffusion
#   - current_due_to_bootstrap

# === Transport mechanisms ===
- conduction
- convection
- diffusion
- neoclassical
- turbulent
- anomalous

# === Heating and current drive ===
- ohmic
- electron_cyclotron_heating
- ion_cyclotron_heating
- ion_cyclotron_current_drive
- lower_hybrid_current_drive
- neutral_beam_injection
- electron_cyclotron_current_drive

# === Atomic processes ===
- radiation
- impurity_radiation
- recombination
- ionization
- charge_exchange

# === Current drive mechanisms ===
- induction
- bootstrap
- non_inductive

# === Fueling ===
- gas_injection
- pellet_injection

# === Fusion reactions ===
- beam_beam_fusion
- beam_thermal_fusion

# === Other processes ===
- resistive
- viscous
- magnetohydrodynamic
- external_coil
- eddy_current
- passive_structure
- disruption
- halo

# === D.3 review §5 additions ===
- neoclassical_tearing_mode   # neoclassical tearing mode (NTM) instability; replaces `ntm_`
- ohmic_dissipation            # ohmic (resistive Joule) dissipation
- resistive_diffusion          # resistive magnetic field diffusion
- resistive_flux_consumption   # resistive consumption of magnetic flux
- non_inductive_drive          # aggregate non-inductive current drive
- wave_driven                  # wave-driven heating or current drive
- parallel_viscosity           # parallel viscous stress or dissipation
- perpendicular_viscosity      # perpendicular viscous stress or dissipation
- heat_viscosity               # gyroviscous (heat) stress
- j_cross_b_force              # J×B electromagnetic body force
- poloidal_current             # poloidal current generation
