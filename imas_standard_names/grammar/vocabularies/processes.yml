- resistive
- viscous
- magnetohydrodynamic
- external_coil
- eddy_current
- passive_structure
- disruption
- halo

# === D.3 review §5 additions ===
- neoclassical_tearing_mode   # neoclassical tearing mode (NTM) instability; replaces `ntm_`
- ohmic_dissipation            # ohmic (resistive Joule) dissipation
- resistive_diffusion          # resistive magnetic field diffusion
- resistive_flux_consumption   # resistive consumption of magnetic flux
- non_inductive_drive          # aggregate non-inductive current drive
- wave_driven                  # wave-driven heating or current drive
- parallel_viscosity           # parallel viscous stress or dissipation
- perpendicular_viscosity      # perpendicular viscous stress or dissipation
- heat_viscosity               # gyroviscous (heat) stress
- j_cross_b_force              # J×B electromagnetic body force
- poloidal_current             # poloidal current generation

# === D.5 review §5 additions ===
- viscous_heat_flux            # viscous contribution to heat flux
- inertial                     # inertial (momentum) contribution

# === rc13 codex-rotation additions ===
# From plasma_wall_interactions, fast_particles, magnetic_field_systems,
# diagnostic and control rotation in imas-codex (gap export 2026-04-19).
- collisions                   # Coulomb / particle collisions process
- thermalization               # slowing-down of fast particles to thermal energy
- fast_ion                     # fast-ion drive / source process (e.g. NBI fast-ion current)
- external_coils               # plural form for due_to_external_coils (singular external_coil retained)
- non_inductive_current        # current driven by non-inductive means (preferred over non_inductive)

# === rc14 vocabulary extensions (codex plan 31) ===
- e_cross_b_drift              # E×B drift mechanism (plasma_control, edge)
- thermal_fusion               # pure-thermal fusion (alongside beam_beam_, beam_thermal_)
- thermalization_of_fast_particles  # distribution-source thermalisation
- halo_currents                # noun form for due_to_halo_currents
- fast_ions                    # plural noun form for due_to_fast_ions
- non_inductive_current_drive  # explicit synonym alongside non_inductive_drive

# === rc15 vocabulary extensions (edge-plasma rotation) ===
# Diamagnetic drift is a first-class transport mechanism: fluxes "due to
# diamagnetic drift" arise from the ∇p × B / (nqB²) drift in the
# fluid momentum equation. Distinct from the diamagnetic component of a
# vector (which is handled by `diamagnetic_*` physical_bases per
# components.yml guidance). DD sources: edge_profiles/*, transport/*.
- diamagnetic_drift
