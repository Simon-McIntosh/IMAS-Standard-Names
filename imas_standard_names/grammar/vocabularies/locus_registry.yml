  # ====================================================================
  # Position-typed loci (field at location: _at_<position>, _of_<position>)
  # Physics-meaningful spatial locations in tokamak geometry
  # ====================================================================

  # line_of_sight: migrated from geometry_carriers.yml (was an unused bare
  # carrier token; no name composed it standalone or via _of_). It names the
  # coordinate running along a diagnostic chord, matching the ALONG semantics
  # below (toroidal_angle_along_line_of_sight).
  line_of_sight:
    type: position
    allowed_relations: [at, of, along]
    definition: The directed observation path from a diagnostic aperture or detector through the observed domain.
  antenna_row:
    type: position
    allowed_relations: [at, of]
    definition: The spatial location identified as the antenna row in the relevant plasma, diagnostic, or plant context.
