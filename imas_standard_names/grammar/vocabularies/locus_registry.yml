# Locus registry vocabulary (plan 38 §A5)
#
# Typed registry replacing the rc20 objects.yml + positions.yml + scattered
# device/geometry entries.  Every locus token carries:
#   type            - entity | position | geometry
#   allowed_relations - subset of [of, at, over]
#
# Compatibility matrix enforced at validation time:
#   entity   -> of          (intrinsic property of an entity)
#   position -> at, of      (field at location, geometric property of location)
#   geometry -> at, of, over (field over a geometric shape)
#
# Populated by W2a from rc20 objects.yml + positions.yml migration and
# corpus mining (44 entity + 41 position + 8 geometry tokens).

