  limiter:
    type: position
    allowed_relations: [at, of, along]
    definition: >-
      Plasma-facing limiter. As a measurement locus, 'at_limiter' denotes the
      scrape-off-layer plasma immediately adjacent to the limiter surface; the
      DD provides only the limiter surface geometry
      (wall/description_2d/limiter) and the precise plasma evaluation point is
      not yet standardised (IMAS_3226). For the separatrix-limiter tangency
      CONTACT point use active_limiter_point; for a quantity distributed OVER
      the limiter surface (e.g. a peak power density) use the 'along' relation
      (along_limiter).
