  # ── coil-conductor and diagnostic-optic entities (VocabGap analysis) ──
  # Genuine DD hardware objects (PF/TF/non-axisymmetric coil conductor
  # geometry; diagnostic apertures, filter windows, fibre bundles).
  # Intrinsic properties via _of_<entity>. Entity loci only — ordinal
  # outline/element points stay in DD metadata, not the registry.
  conductor:
    # current-carrying conductor of a coil (tf/coil/conductor,
    # coils_non_axisymmetric/coil/conductor)
    type: entity
    allowed_relations: [of]
  coil_conductor:
