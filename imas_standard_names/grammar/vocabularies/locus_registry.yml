      'dr_dz_zero_sep': the outboard separatrix point where dr/dz = 0). For a
      value at the separatrix intersection use outboard_midplane_separatrix.
  outboard_midplane_separatrix:
    type: position
    allowed_relations: [at, of]
    definition: >-
      Intersection of the separatrix with the outboard (low-field-side)
      midplane - the outboard separatrix point where dr/dz = 0 (the local
      major-radius maximum of the separatrix). This is where a separatrix
      POINT value is evaluated. DD:
      equilibrium/time_slice/boundary_separatrix/dr_dz_zero_point; outer-midplane
      reference per the midplane_identifier.
  outer:
    type: position
    allowed_relations: [at, of]
    definition: The spatial location identified as the outer in the relevant plasma, diagnostic, or plant context.
  outlet:
    type: position
    allowed_relations: [at, of]
    definition: The spatial location identified as the outlet in the relevant plasma, diagnostic, or plant context.
  pedestal:
    type: position
    allowed_relations: [at, of]
    definition: >-
      H-mode edge transport-barrier (pedestal) region. Ambiguous as a single
      point: for a profile VALUE use pedestal_top; for a maximum-gradient or
      fit POSITION use pedestal_maximum. Prefer the more specific token over
      this bare one. DD: summary/local/pedestal, summary/pedestal_fits/*.
    defining_quantity: normalized_poloidal_flux_coordinate_of_pedestal
  pedestal_maximum:
    type: position
    allowed_relations: [at, of]
    definition: >-
      Location of the maximum pedestal gradient (the steep mid-pedestal), i.e.
      the peak-gradient / fit position of the edge barrier. Distinct from the
      pedestal top. DD: summary/pedestal_fits/*/d_dpsi_norm_max_position,
      summary/local/pedestal/position/psi.
    defining_quantity: normalized_poloidal_flux_coordinate_of_pedestal
  pedestal_top:
    type: position
    allowed_relations: [at, of]
    definition: >-
      Top of the H-mode edge pedestal (the barrier's inner shoulder), where
      'the pedestal value' of a profile is conventionally reported. DD:
      summary/pedestal_fits/* pedestal-top fit outputs.
    defining_quantity: normalized_poloidal_flux_coordinate_of_pedestal
  pedestal_top_high_field_side:
    type: position
    allowed_relations: [at, of]
    definition: The spatial location identified as the pedestal top high field side in the relevant plasma, diagnostic, or plant context.
  pedestal_top_low_field_side:
    type: position
    allowed_relations: [at, of]
    definition: The spatial location identified as the pedestal top low field side in the relevant plasma, diagnostic, or plant context.
  pellet_path:
    type: position
    allowed_relations: [at, of, along]
    definition: The trajectory followed by a pellet through the device or plasma.
  pellet_path_point:
    type: position
    allowed_relations: [at, of]
    definition: A specified point on a pellet trajectory.
  plasma_boundary:
    type: position
    allowed_relations: [at, of]
    definition: The surface used to delimit the plasma domain for the quantity being described.
  plasma_boundary_gap:
    type: position
    allowed_relations: [at, of]
    definition: The shortest directed separation between the plasma boundary and a specified reference surface or point.
  plasma_boundary_gap_reference_point:
    type: position
    allowed_relations: [at, of]
    definition: The fixed reference point used to define a plasma-boundary gap measurement.
  post_sawtooth_crash:
    type: position
    allowed_relations: [at, of]
    definition: The spatial location identified as the post sawtooth crash in the relevant plasma, diagnostic, or plant context.
  sawtooth_inversion_radius:
    type: position
    allowed_relations: [at, of]
    definition: The spatial location identified as the sawtooth inversion radius in the relevant plasma, diagnostic, or plant context.
  sawtooth_mixing_radius:
    # outer radius of the sawtooth reconnection/mixing region (companion to
    # the sawtooth_inversion_radius); DD: sawteeth diagnostics
    type: position
    allowed_relations: [at, of]
    definition: The spatial location identified as the sawtooth mixing radius in the relevant plasma, diagnostic, or plant context.
  sensor_attachment_point:
    type: position
    allowed_relations: [at, of]
    definition: The spatial location identified as the sensor attachment point in the relevant plasma, diagnostic, or plant context.
  separatrix:
    type: position
    allowed_relations: [at, of]
    qualifiable: true
    definition: >-
      Last closed flux surface / separatrix. For a flux-surface-averaged
      quantity apply the flux_surface_averaged operator (DD
      summary/local/separatrix_average/*); for a bare point value at the
      outboard midplane use outboard_midplane_separatrix. DD:
      summary/local/separatrix/*, equilibrium/time_slice/boundary_separatrix.
  shattering_position:
    type: position
    allowed_relations: [at, of]
    definition: The spatial location identified as the shattering position in the relevant plasma, diagnostic, or plant context.
  spectral_line:
    type: position
    allowed_relations: [at, of]
    definition: The spatial location identified as the spectral line in the relevant plasma, diagnostic, or plant context.
  strike_point:
    type: position
    allowed_relations: [at, of]
    definition: The point where a divertor separatrix branch intersects a plasma-facing target.
    qualifiable: true
  tearing_mode_center:
    type: position
    allowed_relations: [at, of]
    definition: The spatial location identified as the tearing mode center in the relevant plasma, diagnostic, or plant context.
  wall:
    type: position
    allowed_relations: [at, of]
    definition: The spatial location identified as the wall in the relevant plasma, diagnostic, or plant context.
  x_point:
    type: position
    allowed_relations: [at, of]
    definition: A poloidal-field null at which separatrix branches intersect in the poloidal plane.
    qualifiable: true

  # ── breadth-rotation gap closure (codex VocabGap analysis) ──────────
  # Genuine physics-meaningful boundary loci (DD-confirmed control /
  # equilibrium geometry points; not ordinal outline labels).
  active_limiter_point:
    # plasma boundary point currently in contact with the device limiter
    # (real-time shape/position control reference)
    type: position
    allowed_relations: [at, of]
    definition: >-
      The point where the last closed flux surface of a limited plasma is
      tangent to (makes contact with) the limiter surface - the
      separatrix-limiter tangency point. Distinct from the SOL-adjacent
      'at_limiter' locus. DD: pulse_schedule/position_control/active_limiter_point.
  dr_dz_zero_point:
    # plasma boundary location where dr/dz = 0 — the outboard local
    # major-radius maximum (widest point of the separatrix)
    type: position
    allowed_relations: [at, of]
    definition: >-
      Outboard point on the separatrix where dr/dz = 0 (the local maximum of
      the separatrix major radius) - the geometric outer-midplane reference
      selected by the DD midplane_identifier option 'dr_dz_zero_sep'. DD:
      equilibrium/time_slice/boundary_separatrix/dr_dz_zero_point.

  # ====================================================================
  # Geometry-typed loci (shape/region boundary: _at_, _of_, _over_)
  # ====================================================================

  active_wall_point:
    type: geometry
    allowed_relations: [at, of, over]
    definition: A point on the wall selected as active for the relevant geometric or physical construction.
  beam_path:
    type: geometry
    allowed_relations: [at, of, over]
    definition: The geometrical curve followed by the central trajectory of a beam.

  # ── Region tokens ──────────────────────────────────────────────────
  # Multi-dimensional loci (volumes, layers, zones) used with _over_.
  core_region:
    type: region
    allowed_relations: [over]
    definition: The central confined-plasma region inside the edge transport-barrier region when one is present.
  divertor_region:
    type: region
    allowed_relations: [over]
    definition: The region surrounding divertor legs, targets, and associated plasma-facing structures.
  edge_region:
    type: region
    allowed_relations: [over]
    definition: The outer confined-plasma region adjacent to the plasma boundary.
  halo_region:
    type: region
    allowed_relations: [over]
    definition: The region outside the confined plasma through which halo currents or halo plasma may extend.
  pedestal_region:
    type: region
    allowed_relations: [over]
    definition: The edge transport-barrier region characterized by steep plasma-profile gradients.
  scrape_off_layer:
    type: region
    allowed_relations: [over]
    definition: The plasma region outside the last closed flux surface whose open field lines intersect material surfaces.
  vessel:
    type: region
    allowed_relations: [over]
    definition: The spatial region enclosed by the vacuum-vessel boundary.
