# Locus registry vocabulary
#
# Typed registry of physical objects, locations, and shapes.  Every locus
# token carries:
#   type            - entity | position | geometry | region
#   allowed_relations - subset of [of, at, over, along]
#
# Compatibility matrix enforced at validation time:
#   entity   -> of                (intrinsic property of an entity)
#   position -> at, of, along     (field at location, geometric property of
#                                  location, or field varying ALONG a
#                                  path-like position such as a beam chord)
#   geometry -> at, of, over      (field over a geometric shape)
#   region   -> over              (field averaged or integrated over a region)
#
# Curation policy:
#   - Tokens must describe physics-meaningful loci, not DD structural artifacts
#   - Ordinal point labels (first_point, second_point) belong in DD metadata
#   - Discretization framework tokens (ggd_*) are not physics positions
#   - Prefer atomic tokens composable via qualifiers over long compounds

# Geometric qualifiers that compose onto a `qualifiable` feature, in canonical
# intra-order (topological selector first: primary/secondary, then vertical
# upper/lower, then radial inner/outer). Renders as <qual>..._<feature>, e.g.
# inner_strike_point, upper_outer_strike_point. Scales to advanced divertor
# topologies (snowflake / X-divertor / super-X) without enumerating every
# strike-point / target combination as its own flat token.
locus_qualifiers: [primary, secondary, upper, lower, inner, outer]

