    # (coils_non_axisymmetric/coil/conductor/elements)
    type: entity
    allowed_relations: [of]
  conductor_cross_section:
    # the cross-sectional profile of a coil conductor
    # (coil/conductor/cross_section, pf_active/coil/geometry annulus)
    type: entity
    allowed_relations: [of]
  aperture:
    # generic diagnostic aperture (utilities/aperture substructure;
    # camera_x_rays/aperture, soft_x_rays/channel/aperture); distinct
    # from the more specific diagnostic_aperture entity
    type: entity
    allowed_relations: [of]
  filter_window:
