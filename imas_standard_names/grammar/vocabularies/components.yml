# Component vocabulary: directional projections and direction-dependent quantities
#
# Usage: <component>_<base>
# Examples:
#   - radial_magnetic_field
#   - toroidal_plasma_velocity
#   - flux_surface_normal_heat_flux
#
# Rulings:
#   - Components use the short prefix form. The retired
#     `{axis}_component_of_{base}` long form does not parse.
#   - `diamagnetic`, `e_cross_b`, and `pfirsch_schlueter` are qualifiers,
#     not component tokens.
#   - `diamagnetic` is a qualifier on drifts and fluxes (in physical_base,
#     e.g. `diamagnetic_drift_velocity`, `diamagnetic_flux`). It is never
#     a subject. Composers must not emit `diamagnetic_X` as a standalone
#     base name.

# === Cardinal / cylindrical directions ===
- radial                       # cylindrical R component in (R, phi, Z)
- toroidal
- vertical
- poloidal
- parallel
- normal
- tangential
- perpendicular                # perpendicular to the magnetic-field direction
- flux_surface_normal          # outward unit normal, toward increasing flux label
# Object-local right-handed frame: e3 is the surface/plane normal oriented
# toward the plasma.  e1 is oriented in positive toroidal phi and is either
# explicitly horizontal or, for the more general DD convention, has a smaller
# absolute global-Z component than e2.  e2 = e3 x e1.  As component tokens,
# these identify a vector projection or a direction-dependent scalar value;
# they do not identify coordinate values or the basis vectors themselves.
- first_local_tangential
- second_local_tangential
- binormal
- x
- y
- z

# === Normalized coordinate-frame directions ===
# These name a projection onto a normalized COORDINATE direction (a flux
# label or normalized machine axis): radial → the ρ (normalized flux radius)
# direction, toroidal → φ, poloidal → θ, vertical → normalized Z. The
# normalized coordinate direction is a genuine, distinct direction, so the
# `normalized_<axis>` prefix is a real component token.
#
# `parallel` and `perpendicular` are deliberately ABSENT here: they are
# field-RELATIVE directions (along / across B) with no separate "normalized"
# variant of the direction itself. In a name like
# `normalized_parallel_momentum_flux`, `normalized` is the GyroBohm/reference
# normalization OPERATOR applied to the parallel momentum flux, not a
# direction. Registering `normalized_parallel`/`normalized_perpendicular` as
# component tokens shadowed that operator reading via longest-match; they are
# removed so the operator peels and the projection resolves to
# `parallel`/`perpendicular` (canonical-qualifier-order §3).
- normalized_radial          # projection onto the ρ (normalized flux radius) direction
- normalized_vertical        # projection onto the normalized vertical (Z) direction
- normalized_toroidal        # projection onto the φ (toroidal angle) direction
- normalized_poloidal        # projection onto the θ (poloidal angle) direction
