# --- Energy type ---
- kinetic                       # kinetic energy component
- stored                        # stored energy
- radiated                      # radiated (emitted) energy/power
- absorbed                      # absorbed energy/power
- launched                      # launched (injected) power
- deposited                     # deposited energy/power
- conducted                     # conducted (conductive) transport
- convected                     # convected (convective) transport
