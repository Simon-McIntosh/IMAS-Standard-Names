- bootstrap                     # bootstrap current mechanism
- beam                          # neutral beam source/drive
- rf                            # radio-frequency source/drive
- nbi                           # neutral beam injection
- alpha                         # alpha particle source
- fusion                        # fusion reaction source
- radiative                     # radiative process
- bremsstrahlung                # bremsstrahlung radiation
- wave_driven                   # wave-driven mechanism
- gas                           # gas injection/puff source

# --- Geometry / spatial ---
- center_of_mass                # center-of-mass reference frame
