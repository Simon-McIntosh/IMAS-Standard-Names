# Qualifier vocabulary: prefix modifiers on physical bases
#
# Usage: <qualifier>_<base>  (recursive: <qual1>_<qual2>_<base>)
# Examples:
#   - collisional_power_density
#   - bootstrap_current_density
#   - energy_confinement_time
#   - non_inductive_current
#   - center_of_mass_velocity
#
# Qualifiers are stripped recursively by _match_base_with_qualifiers()
# before the residue is matched against registered physical bases.
# The parser unions qualifiers with subject tokens; tokens that appear
# in subjects.yml are marked [also-subject] below for documentation.
#
# NOTE: Components (toroidal, poloidal, radial, parallel, perpendicular)
# are handled by components.yml via the coordinate/component segment —
# they are NOT qualifiers.

# === Original modifier_quals (parser.py hardcoded set) ===
# These 19 tokens MUST remain for backward compatibility.

# --- Energy/transport type qualifiers ---
- energy                        # energy transport channel (energy_flux, energy_diffusivity)
- particle                      # particle transport channel [also-subject]
- momentum                      # momentum transport channel (momentum_flux, momentum_source)
- heat                          # heat transport channel (heat_flux, heat_viscosity)

# --- Aggregate/net qualifiers ---
# NOTE: 'total' and 'net' moved to aggregations.yml (the aggregation segment —
# summed/netted over sub-populations, species, or additive contributions).

# --- Collision/transport regime ---
# NOTE: 'thermal' moved to populations.yml (energy-state population modifier).
- collisional                   # collisional regime (collisional_power_density)

# --- Source/mechanism ---
- ohmic                         # ohmic heating/current
- inductive                     # inductively driven
- non_inductive                 # non-inductively driven

# --- Orbit class / energy-state ---
# Moved to populations.yml (orthogonal population segment): trapped, co_passing,
# counter_passing, fast — they compose as <population>_<subject>_<base>.

# --- Nuclear/material ---
- nuclear                       # nuclear heating/energy
- ferritic                      # ferritic material property
- waste                         # waste (rejected) heat/energy

# --- Direction ---
- direction                     # directional qualifier

