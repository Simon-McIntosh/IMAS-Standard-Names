- diamagnetic                   # diamagnetic drift/flux qualifier
- e_cross_b                     # E×B drift qualifier
- field_aligned                 # aligned with magnetic field
- surface                       # surface (2D boundary) qualifier
- volumetric                    # volumetric (per unit volume) qualifier
- line_integrated               # line-integrated measurement
- flux_surface                  # flux-surface averaged/related
- volume_averaged               # volume-averaged quantity
- field_line                    # along a field line
- major                         # major (outer) geometric qualifier
- minor                         # minor (inner) geometric qualifier
- contravariant                 # contravariant tensor component
- covariant                     # covariant tensor component

# --- State / condition ---
- equilibrium                   # equilibrium state
- fluctuating                   # fluctuating component
- mean                          # mean / time-averaged
- effective                     # effective (weighted) value
- normalized                    # normalized (dimensionless) form
- critical                      # critical (threshold) value
- average                       # averaged quantity
- peak                          # peak / maximum value
- minimum                       # minimum value
- maximum                       # maximum value
- saturated                     # saturated state
- steady_state                  # steady-state condition
- transient                     # transient / time-varying
