# Only atomic tokens — compound gaps (lower_inner, upper_outer, etc.)
# must compose from these atomic qualifiers.

# --- Position modifiers ---
# NOTE: upper, lower, inner, outer moved to zones.yml (the ordered zone
# prefix segment — vertical position upper/lower, radial position inner/outer).

# --- Diagnostic / measurement ---
- floating                      # floating state (floating potential, Langmuir probe)
- reflected                     # reflected wave/signal (reflectometry)
- polarization                  # wave polarization property
- spectral                      # spectral (wavelength-resolved) measurement

# --- Physics / MHD ---
- mode                          # mode (MHD/wave mode frequency, mode number)
- quench                        # quench event (thermal quench, current quench)
# NOTE: 'vector' removed — vector_potential is now an atomic base
# (physical_bases.yml). vector bound only to potential.
- enhancement                   # enhancement (enhancement factor)

# --- Control / engineering ---
- requested                     # requested / reference setpoint (control systems)

# --- Named parameters ---
- ejima                         # Ejima (volt-second consumption coefficient)

# --- Physics regime / type ---
# NOTE: 'internal' removed — internal_inductance and internal_energy are now
# atomic bases (physical_bases.yml). internal bound only to those two bases.
- mhd                           # magnetohydrodynamic: mhd_mode_frequency, mhd_stored_energy
- wave                          # wave (electromagnetic/acoustic): wave_absorbed_power, wave_number
# fast_wave / slow_wave: ICRF wave-branch lexical terms (fast magnetosonic /
# slow wave). Single qualifier tokens so 'fast'/'slow' here never read as an
# energy-state population: fast_wave_power = qualifier fast_wave + base power
# (NOT population=fast + wave_power). Longest-prefix matching makes the
# lexical wave term win over the population token automatically.
- fast_wave                     # fast (magnetosonic) wave branch: fast_wave_power
- slow_wave                     # slow wave branch: slow_wave_power
- linear                        # linear (perturbative regime): linear_growth_rate, linear_frequency

# --- Position modifiers ---
# NOTE: outer moved to zones.yml (radial position, counterpart to inner).

# --- Coupling / interaction ---
- mutual                        # mutual interaction (mutual inductance, mutual coupling)

# --- Spatial / symmetry modifiers ---
# NOTE: 'angular' removed — angular_momentum, angular_frequency, and
# angular_velocity are now atomic bases (physical_bases.yml). angular bound
# only to those three bases.
- non_axisymmetric              # non-axisymmetric (non_axisymmetric_magnetic_field)

# --- Measurement / signal qualifiers ---
- pulse                         # pulse (pulse_height, pulse_shape) — detector signal characteristics

