# Operator registry vocabulary (plan 38 §A7)
#
# Unified replacement for transformations.yml + decomposition.yml +
# reductions.py patterns.  All operator tokens are stored as BARE tokens
# (no trailing _of_); the rendering engine appends _of_ for unary_prefix
# operators and handles binary separators.
#
# Schema per entry:
#   kind          - unary_prefix | unary_postfix | binary
#   precedence    - int; higher = applied further out (wraps more of the name)
#   returns       - optional str describing the return kind
#   arg_types     - optional list[str] constraining valid input kinds
#   separator     - str used between arguments for binary operators
#   indexed       - bool; if true, index parameters are appended to the name
#   index_params  - list[str] naming the index parameters (requires indexed=true)
#
# Rendering templates:
#   unary_prefix   ->  <token>_of_<inner>
#   unary_postfix  ->  <inner>_<token>
#   binary         ->  <token>_of_<A><separator><B>
#
# Populated by W2a from corpus mining (25 prefix + 15 postfix + 3 binary)
# and migration from transformations.yml + decomposition.yml (plan 38 §A9).

operators:

  # ====================================================================
  # Unary prefix operators (rendered: <token>_of_<inner>)
  # ====================================================================

  accumulated:
    kind: unary_prefix
    precedence: 15
    returns: scalar

  cumulative:
    kind: unary_prefix
    precedence: 15
    returns: scalar

  cumulative_inside_flux_surface:
    kind: unary_prefix
    precedence: 15
    returns: scalar

  derivative:
    kind: unary_prefix
    precedence: 20
    returns: scalar_or_vector

  derivative_with_respect_to:
    kind: unary_prefix
    precedence: 20
    returns: scalar_or_vector
    indexed: true
    index_params: [coord]

  flux_surface_averaged:
    kind: unary_prefix
    precedence: 30
    returns: scalar_or_vector

  gradient:
    kind: unary_prefix
    precedence: 20
    returns: vector
    arg_types: [scalar]

  inverse:
    kind: unary_prefix
    precedence: 20
    returns: scalar_or_vector

  line_averaged:
    kind: unary_prefix
    precedence: 30
    returns: scalar

  line_integrated:
    kind: unary_prefix
    precedence: 30
    returns: scalar

  logarithm:
    kind: unary_prefix
    precedence: 20
    returns: scalar
    dimensionless: true

  magnitude:
    kind: unary_postfix
    precedence: 10
    returns: scalar
    arg_types: [vector, complex]

  maximum:
    kind: unary_prefix
    precedence: 30
    returns: scalar_or_vector

  maximum_over_flux_surface:
    kind: unary_prefix
    precedence: 30
    returns: scalar_or_vector

  minimum:
    kind: unary_prefix
    precedence: 30
    returns: scalar_or_vector

  minimum_over_flux_surface:
    kind: unary_prefix
    precedence: 30
    returns: scalar_or_vector

  normalized:
    kind: unary_prefix
    precedence: 15
    returns: scalar_or_vector
    dimensionless: true

  per_toroidal_mode:
    kind: unary_prefix
    precedence: 35
    returns: scalar_or_vector

  per_poloidal_mode:
    kind: unary_prefix
    precedence: 35
    returns: scalar_or_vector

  per_toroidal_and_poloidal_mode_number:
    kind: unary_prefix
    precedence: 35
    returns: scalar_or_vector

  perturbed:
    kind: unary_prefix
    precedence: 15
    returns: scalar_or_vector
    dimensionless: true

  radial_derivative:
    kind: unary_prefix
    precedence: 20
    returns: scalar_or_vector

  root_mean_square:
    kind: unary_prefix
    precedence: 30
    returns: scalar

  second_derivative:
    kind: unary_prefix
    precedence: 20
    returns: scalar_or_vector

  second_radial_derivative:
    kind: unary_prefix
    precedence: 20
    returns: scalar_or_vector

  square:
    kind: unary_prefix
    precedence: 20
    returns: scalar_or_vector

  surface_integrated:
    kind: unary_prefix
    precedence: 30
    returns: scalar

  tendency:
    kind: unary_prefix
    precedence: 20
    returns: rate

  # Finite/discrete increment (Delta) of the base over an event — NOT a rate.
  # Unlike tendency/time_derivative (which return a per-time rate and render
  # with _of_), change_in preserves the base unit and renders BARE
  # (change_in_electron_density). It therefore also appears in the
  # _BARE_PREFIX_TRANSFORMATIONS set in model.py. Suits discrete event-driven
  # changes (sawtooth, ELM, pellet) under core_instant_changes/.
  change_in:
    kind: unary_prefix
    precedence: 20
    returns: scalar_or_vector

  time_average:
    kind: unary_prefix
    precedence: 30
    returns: scalar_or_vector

  time_derivative:
    kind: unary_prefix
    precedence: 20
    returns: rate

  variation:
    kind: unary_prefix
    precedence: 20
    returns: scalar_or_vector

  volume_averaged:
    kind: unary_prefix
    precedence: 30
    returns: scalar_or_vector

  volume_integrated:
    kind: unary_prefix
    precedence: 30
    returns: scalar

  # --- Uncertainty modifier operators (rc23 — B9 error siblings) ---
  # Three deterministic operators for IMAS _error_upper / _error_lower /
  # _error_index companion fields.  Applied as outer wrappers of the
  # parent standard name: upper_uncertainty_of_<P>, etc.

  upper_uncertainty:
    kind: unary_prefix
    precedence: 5
    returns: scalar_or_vector

  lower_uncertainty:
    kind: unary_prefix
    precedence: 5
    returns: scalar_or_vector

  uncertainty_index:
    kind: unary_prefix
    precedence: 5
    returns: scalar

  # ====================================================================
  # Unary postfix operators (rendered: <inner>_<token>)
  # ====================================================================

  # Scalar-extraction operators.  Postfix like magnitude so they compose
  # with a projection: radial_electric_field_amplitude, not
  # amplitude_of_radial_electric_field (prefix + component are mutually
  # exclusive in the flat model).
  amplitude:
    kind: unary_postfix
    precedence: 10
    returns: scalar

  real_part:
    kind: unary_postfix
    precedence: 10
    returns: scalar
    arg_types: [complex]

  imaginary_part:
    kind: unary_postfix
    precedence: 10
    returns: scalar
    arg_types: [complex]

  bessel_0:
    kind: unary_postfix
    precedence: 10
    returns: scalar
    indexed: true
    index_params: [order]

  bessel_1:
    kind: unary_postfix
    precedence: 10
    returns: scalar
    indexed: true
    index_params: [order]

  constraint_exact_flag:
    kind: unary_postfix
    precedence: 5
    returns: scalar

  fourier_coefficient:
    kind: unary_postfix
    precedence: 40
    indexed: true
    index_params: [m, n]

  gyroaveraged:
    kind: unary_postfix
    precedence: 10
    returns: scalar_or_vector

  moment:
    kind: unary_postfix
    precedence: 10
    returns: scalar

  reference_waveform:
    kind: unary_postfix
    precedence: 5
    returns: scalar

  waveform:
    kind: unary_postfix
    precedence: 5
    returns: scalar

  # ====================================================================
  # Binary operators (rendered: <token>_of_<A><separator><B>)
  # ====================================================================

  difference:
    kind: binary
    separator: _and_
    precedence: 5

  product:
    kind: binary
    separator: _and_
    precedence: 5

  ratio:
    kind: binary
    separator: _to_
    precedence: 5
