# Geometry carriers vocabulary
#
# Closed vocabulary of geometric shape tokens that can carry a coordinate
# projection (shape=coordinate).  Distinct from physical_bases.yml which
# holds physical quantity nouns.
#
# Examples of geometry carriers: position, outline, centroid, trajectory,
# boundary_outline, midplane_outline, …
#
# Note: QUANTITIES *about* geometry (e.g. area_of_flux_surface) remain in
# physical_bases.yml.
#
# Structure per entry:
#   aliases  - list of alternate tokens (empty default)
#   constant_on_flux_surface - true for flux-label carriers (rho_tor and
#              friends): constant on any flux surface, so a flux-surface
#              reduction operator on them is a no-op and is rejected.
#
# Migrated from geometric_bases.yml.

carriers:

  # === Core geometry carriers ===
  # line_of_sight moved to locus_registry.yml (position-typed locus, relation
  # 'along': toroidal_angle_along_line_of_sight) — it named a diagnostic
  # chord/path locus, not a standalone geometric-base noun, and no name used
  # it bare or via _of_ composition.
  centroid:
    aliases: []
  normalized_minor_radius:
    aliases: []
  normalized_toroidal_flux_coordinate:
    aliases: []
    constant_on_flux_surface: true
  offset:
    aliases: []
  position:
    aliases: []
  radial_coordinate:
    aliases: []
  toroidal_flux_coordinate:
    aliases: []
    constant_on_flux_surface: true

  # === Migrated from geometric_bases.yml (carrier-type entries) ===
  contour:
    aliases: []
  coordinate:
    aliases: []
  displacement:
    aliases: []
  extent:
    aliases: []
  normalized_poloidal_flux_coordinate:
    aliases: []
    constant_on_flux_surface: true
  outline:
    aliases: []
  sensor_normal:
    aliases: []
  surface_normal:
    aliases: []
  tangent_vector:
    aliases: []
  trajectory:
    aliases: []
  unit_vector:
    aliases: []
  vertex:
    aliases: []

  # === Local tangent-frame carriers ===
  # These tokens describe ordered directions in an object-local tangent plane.
  # They deliberately do not imply alignment with a machine-frame axis or a
  # principal-curvature direction.
  first_local_tangential_coordinate:
    aliases: []
  second_local_tangential_coordinate:
    aliases: []

  first_local_tangential_unit_vector:
    aliases: []
  second_local_tangential_unit_vector:
    aliases: []

  # === Angular and normal-axis carriers ===
  poloidal_angle:  # poloidal angle coordinate (sensor orientation, equilibrium grids)
    aliases: []
  toroidal_angle:  # toroidal angle coordinate (sensor orientation, probe geometry)
    aliases: []
  normal_coordinate:  # Frenet-Serret normal-axis coordinate (conductor cross-section outlines)
    aliases: []
  binormal_coordinate:  # Frenet-Serret binormal-axis coordinate (conductor cross-section outlines)
    aliases: []
  direction_unit_vector:  # unit vector along a specified direction
    aliases: []
  toroidal_flux_radius:  # toroidal flux radius coordinate (rho_tor)
    aliases: []
    constant_on_flux_surface: true
  image_up_unit_vector:  # image-up orientation of an imaging device, distinct from its line-of-sight direction_unit_vector — N=3 (camera_ir camera/up/{x,y,z})
    aliases: []
  major_axis_unit_vector:  # major principal axis of an elliptical cross-section — N=3 (spi shatter_cone/unit_vector_major/{x,y,z})
    aliases: []
  minor_axis_unit_vector:  # minor principal axis of an elliptical cross-section — N=3 (spi shatter_cone/unit_vector_minor/{x,y,z})
    aliases: []
  first_measurement_direction_unit_vector:  # a strain-rosette gauge's first measurement-axis unit vector — N=3 (operational_instrumentation sensor/direction/{x,y,z})
    aliases: []
  second_measurement_direction_unit_vector:  # a strain-rosette gauge's second measurement-axis unit vector — N=3 (operational_instrumentation sensor/direction_second/{x,y,z})
    aliases: []
