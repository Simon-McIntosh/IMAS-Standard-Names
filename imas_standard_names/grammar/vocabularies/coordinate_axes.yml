# Coordinate axes vocabulary (plan 38 §A4)
#
# Used with GeometryCarrier (shape=coordinate) to form projections like
# "radial_coordinate_of_flux_loop".  Distinct from components.yml which
# is used with QuantityBase (shape=component, e.g.
# "radial_component_of_magnetic_field").
#
# Populated by W2a from corpus mining (10 coordinate_axis tokens):
#   normalized_parallel, normalized_poloidal, normalized_toroidal,
#   parallel, perpendicular, poloidal, radial, toroidal, vertical, x

axes:
  normalized_parallel:
    aliases: []
  normalized_perpendicular:
    aliases: []
  normalized_poloidal:
    aliases: []
  normalized_radial:
    aliases: []
  normalized_toroidal:
    aliases: []
  normalized_vertical:
    aliases: []
  parallel:
    aliases: []
  perpendicular:
    aliases: []
  poloidal:
    aliases: [pol]
  radial:
    aliases: [r]
  toroidal:
    aliases: [phi, tor]
  # Frame rule: Cartesian family triples are x, y, z; cylindrical triples are
  # radial, toroidal, vertical. `vertical` is cylindrical Z and standalone
  # machine-vertical quantities; `z` appears only as the third member of an
  # x, y, z family. Per-family triple consistency is enforced by the
  # imas-codex vector-node family audit.
  vertical:
    aliases: []
  x:
    aliases: []
  y:
    aliases: []
  z:
    aliases: []
