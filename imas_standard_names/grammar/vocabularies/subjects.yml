# Subject vocabulary: particle species and plasma entities
#
# Usage: <subject>_<base>  (optionally with a population modifier prefix:
#   <population>_<subject>_<base>, e.g. fast_ion_pressure, thermal_electron_density)
#
# Examples:
#   - electron_temperature
#   - ion_density
#   - deuterium_pressure
#
# SUBJECTS ARE SPECIES / ENTITIES ONLY. Modifier qualifiers (energy-state
# fast/thermal/cold/hot/suprathermal, orbit class trapped/co_passing/…,
# molecularity, aggregation total/bulk, regime, polarization) live in the
# orthogonal `population` segment (populations.yml) as of the rc32 vocab
# decomposition — they are NOT subject tokens.
#
# Kept atomic (not decomposed): runaway_electron, gyrocenter, neutral_beam,
# edge_localized_mode, halo, the reaction pairs, the SPI/pellet/gas species,
# and the ionisation-state qualifiers (ion_state, ion_charge_state, …).
#
# Source of truth is the Subject enum in grammar/model_types.py; this list
# mirrors it for cross-segment vocabulary validation.

# === Core plasma species ===
# NOTE: 'plasma' is intentionally NOT a subject — 'plasma_current', 'plasma_
# volume', etc. are lexicalised physical_bases (generic base + implicit plasma).
# Aggregation modifiers compose as total_plasma_current = population=total +
# base=plasma_current.
- electron
- ion
- neutral
- particle
- neutron

# === Fusion fuel + isotopes ===
- hydrogen
- hydrogenic
- deuterium
- tritium
- helium
- helium_3
- helium_4
- alpha_particle

# === Impurity elements ===
- carbon
- nitrogen
- neon
- argon
- boron
- beryllium
- tungsten
- iron
- lithium
- oxygen
- krypton
- xenon

# === Reaction channels (atomic pairs) ===
- deuterium_tritium
- deuterium_deuterium
- tritium_tritium

# === Distinct atomic populations / entities (kept atomic) ===
- runaway_electron
- pfirsch_schlueter
- neutral_beam
- impurity_ion
- impurity_species
- ion_species
- neutral_species
- gyrocenter
- gyrokinetic
- halo
- hard_xray
- edge_localized_mode

# === Ionisation / atomic-state qualifiers ===
- ion_state
- ion_charge_state
- neutral_state
- state

# === Injected / fuelling species ===
- pellet
- shattered_pellet
- shattered_pellet_fragment
- shattered_pellet_species
- ammonia
- silane
