site_name: "Fusion Conventions: Standard Names"
site_url:
  !ENV [SITE_URL, "https://iterorganization.github.io/IMAS-Standard-Names/"]

# Build into a sibling directory that does NOT collide with the
# committed Vite SPA source at ``site/``. The SPA owns ``site/``; the
# mkdocs grammar-reference site writes here.
site_dir: _mkdocs_site/

# Reckon plan-system artifacts live under docs/ (served by the local reckon
# server, not published here). Keep them out of the mkdocs build so the SPA
# index.html does not collide with index.md and the plan/state files are not
# copied into the published site.
exclude_docs: |
  /index.html
  /*.html
  /_shared/
  /state/
  /.nojekyll

plugins:
  - include-markdown
  - macros:
      verbose: true
      modules:
        - docs.grammar_macros
  - search
  - table-reader
  - mike:
      canonical_version: latest
      version_selector: true
      css_dir: stylesheets
      javascript_dir: javascripts

watch:
  - imas_standard_names/grammar/specification.yml
  - imas_standard_names/grammar/vocabularies/
  - docs/grammar_macros.py

nav:
  - Home: index.md
  - Catalog: catalog.md
  - Grammar Reference: grammar-reference.md
  - Guidelines: guidelines.md
  - Development:
    - Quick Start: development/quickstart.md
    - Style Guide: development/style-guide.md
    - Specification: development/specification.md
    - Provenance: development/provenance.md
    - Reductions: development/reductions.md
    - Contributing: development/contributing.md

theme:
  name: material
  features:
    # - navigation.instant  # Temporarily disabled for testing
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.top

extra:
  version:
    provider: mike

# Enable latex/math notation
markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - attr_list

extra_css:
  - stylesheets/catalog.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/anchor-scroll.js
